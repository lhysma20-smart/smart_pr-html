<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- 리스트(목록) 태그 : 
         1. ol태그 : 순서가 있는 목록(rodered list)
         2. ul태그 : 순서가 없는 목록(unordered list)
         3. li태그 : ul, ol 요소에서 공통적으로 사용되는 목록의 요소
    -->
    <!-- ul 속성 
         type = "circle"(채워져있지 않은 동그라미)
         type = "square"(네모)
         type = "none"(없음) 
    -->
    <!-- ol 속성 : 
           type ="A"
           type = "a"
           type = "" 
           type = "A" srart="3"(3번 부터 시작)
    -->

   <h3>내가 좋아하는 과일</h3>
    <ul>
        <li>사과</li>
        <li>포도</li>
        <li>배</li>
    </ul>

    <h3>토마토 스파게티 만드는 방법</h3>
     <ol type = "A" start="3"> 
         <li>스파게티 면을 삶는다</li>
         <li>삶은 스파게티 면과 토마토 소스를 넣는다</li>
         <li>먹는다</li>
      </ol> 
</body>
</html>
