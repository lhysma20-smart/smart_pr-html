<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- table : 표 형태(행과 열을 가진 행태) -->
     <table border="1">
        <caption>에스파 정보</caption>
        <!-- tr : 행(가로) -->
         <tr bgcolor ="skyblue">
            <!-- th : 컬럼의 제목 -->
             <th width="50px">나이</th>
             <th width="100px">이름</th>
         </tr>
         <!-- 첫번째 행 끝 -->
         <tr align="center">
            <!-- td : 열(세로), 데이터 -->
             <td>24</td>
             <td>카리나</td>
         </tr>
         <!-- 두번째 행 끝 -->
         <tr align="center">
            <td>24</td>
            <td>윈터</td>
         </tr>
         <!-- 세번째 행 끝 -->
         <tr align="center">
            <td>24</td>
            <td>지젤</td>
         </tr>
         <!-- 네번째 행 끝 -->
         <tr align="center">
            <td>22</td>
            <td>닝닝</td>
         </tr>
         <!-- 다섯번째 행 끝 -->
         <tr align="center">
            <!-- colspan : 열 병합 -->
             <!-- rowspan : 행 병합  -->
              <td colspan="2">비고</td>
             
         </tr>
         <!-- 여섯번째 행 끝 -->
     </table>




</body>
</html>
