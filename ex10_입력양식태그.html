<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- form 태그 : 입력폼을 만드는 태그 -->
     <!-- action : form 태그 안에 있는 데이터들을 전달할 url 지정
                   지정할 url이 없는 경우에는 #를 사용할수 있다! 
     -->
     <form action="#">
        <!-- input : 입력태그 -->
         <!-- type="text" : 데이터를 입력할 수 있는 태그
              placeholder : 미리보기 텍스트 지정
              maxlength : 최대 글자 수 제한
              autofocus : 자동 커셔 설정 
         
         -->
         ID 입력 : <input type="text" placeholder="아이디입력"
         maxlength="10" autofocus
         >
        <br>
        <!-- 비밀번호를 입력할 때 사용 -->
        비밀번호 입력 : <input type="password">
        <br>
        파일 업로드 : <input type="file">
        <br>
        색깔 선택 : <input type="color">
        <br>
        날짜 선택 : <input type="datetime-local">
        <br>
        <!-- type="checkbox" : 중복 선택이 가능한 경우에 사용 -->
        내가 좋아하는 간식 : 
        아이스크림🍦<input type="checkbox">
        도넛🍩<input type="checkbox">
        햄버거🍔<input type="checkbox">

        <!-- type="radio" : 하나만 선택해야하는 경우에 사용
             radio를 사용할 때는 중복 선택을 막기 위해서
             name 속성을 사용해야한다! 
             동일한 name값을 넣어주면 중복 선택을 막을 수 있다
        -->
        <br>
        성별 선택 :
        남자 <input type="radio" name="gender">
        여자 <input type="radio" name="gender">
        <br>
        <!-- submit : input 요소의 모든 값을 전송할 때 사용 -->
         <input type="submit" value="회원가입">
         <!-- reset : input 요소의 모든 값을 초기화 -->
          <input type="reset" value="삭제">
     </form>





</body>
</html>
