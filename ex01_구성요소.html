<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- title : 문서 제목 -->
    <title>나만의 홈페이지</title>
</head>
<!-- body : 문서 내용(텍스트, 이미지) -->

<body>
    <!-- 주석 : ctrl + /  -->
    <!-- 저장 : ctrl + s -->
    <!-- 실행 : alt + l + o -->
    hello world!

    <b>hello world!</b>
    <strong>주의 경고!</strong>
    <!-- 제목태그(h1 ~ h6) : 제목을 표현하는 태그 -->
    <h1>제목</h1>
    <h2>제목</h2>
    <h3>제목</h3>
    <h4>제목</h4>
    <h5>제목</h5>
    <!-- 한줄 복사 : ctrl + alt + 방향키 -->
    <!-- 한줄 삭제 : ctrl + d -->
    <!-- 정렬 : ctrl + shift + f -->
</body>

</html>
