<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- 글자태그 
         1. p : 문단을 나눌 때 사용하는 요소
         2. span : 범위를 의미하는 요소 -> 스타일을 적용해서 활용

    -->
   <p>안녕하세요</p>
   <p>오늘은 첫 <span style="color: aqua;">html</span> 시간입니다.</p>
   <!-- hr : 구분선 -->
   <hr>
   <span>안녕하세요.</span>
   <!-- br : 줄바꿈(개행) -->
   <br>
   <span>오늘은 첫 html 시간입니다.</span>


</body>
</html>
